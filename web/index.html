<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeadFish</title>
  <style>
    :root {
      --bg: #e8dcc7;
      --panel: rgba(255, 249, 240, 0.88);
      --panel-strong: #fffaf2;
      --ink: #2f2117;
      --muted: #6f5542;
      --accent: #1b5e4a;
      --accent-soft: #2f7c64;
      --light: #f1dfc3;
      --dark: #a97951;
      --target: rgba(52, 152, 219, 0.28);
      --selected: rgba(46, 204, 113, 0.34);
      --border: rgba(68, 42, 17, 0.12);
      --shadow: 0 18px 40px rgba(45, 26, 10, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.72), transparent 34%),
        linear-gradient(135deg, #efe5d4, var(--bg));
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }
    .app {
      width: min(1100px, 96vw);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 22px;
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .board-panel {
      display: grid;
      gap: 14px;
      justify-items: center;
      min-width: 0;
    }
    .board {
      width: min(72vw, 680px);
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      border: 12px solid #4a301d;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(45, 26, 10, 0.2);
    }
    .square {
      border: 0;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: clamp(26px, 5vw, 54px);
      cursor: pointer;
      position: relative;
      background: transparent;
    }
    .square.light { background: var(--light); }
    .square.dark { background: var(--dark); }
    .square.selected::after,
    .square.target::after {
      content: "";
      position: absolute;
      inset: 8%;
      border-radius: 12px;
      pointer-events: none;
    }
    .square.selected::after { background: var(--selected); }
    .square.target::after { background: var(--target); }
    .piece {
      position: relative;
      z-index: 1;
      line-height: 1;
      filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.25));
    }
    .piece.white { color: #fffaf4; }
    .piece.black { color: #1f1713; }
    .side-panel {
      display: grid;
      align-content: start;
      gap: 14px;
    }
    .card {
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 3vw, 38px);
    }
    .status {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .detail,
    .engine-stats,
    .hint {
      color: var(--muted);
      line-height: 1.45;
    }
    .controls,
    .fen-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    button,
    select,
    input {
      font: inherit;
    }
    button {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      padding: 10px 16px;
      cursor: pointer;
    }
    button:hover { background: var(--accent-soft); }
    select,
    input {
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fffdf9;
      color: var(--ink);
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 14px;
    }
    .moves {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
      max-height: 320px;
      overflow-y: auto;
      font-variant-numeric: tabular-nums;
    }
    .moves li { padding: 2px 0; }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .board { width: min(88vw, 560px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="board-panel">
      <div id="board" class="board" aria-label="DeadFish board"></div>
    </section>
    <aside class="side-panel">
      <section class="card">
        <h1>DeadFish</h1>
        <div id="statusText" class="status">Loading engine...</div>
        <div id="detailText" class="detail">The browser demo runs the rebuilt engine through WebAssembly.</div>
      </section>

      <section class="card">
        <div class="controls">
          <button id="resetBtn" type="button">Reset</button>
          <button id="flipBtn" type="button">Flip</button>
        </div>
        <div style="height: 12px;"></div>
        <label>
          Search depth
          <select id="depthSelect">
            <option value="3">3 ply</option>
            <option value="4" selected>4 ply</option>
            <option value="5">5 ply</option>
            <option value="6">6 ply</option>
          </select>
        </label>
        <label>
          Move time
          <select id="timeSelect">
            <option value="0" selected>Depth only</option>
            <option value="100">100 ms</option>
            <option value="250">250 ms</option>
            <option value="500">500 ms</option>
            <option value="1000">1000 ms</option>
          </select>
        </label>
      </section>

      <section class="card">
        <div class="status">Engine</div>
        <div id="engineStats" class="engine-stats">Idle</div>
      </section>

      <section class="card">
        <div class="status">FEN</div>
        <div class="fen-controls">
          <input id="fenInput" type="text" spellcheck="false">
          <button id="loadFenBtn" type="button">Load FEN</button>
        </div>
      </section>

      <section class="card">
        <div class="status">Moves</div>
        <ol id="moveList" class="moves"></ol>
      </section>

      <section class="card">
        <div class="hint">
          White is human. Black is DeadFish running in a worker-backed WASM module.
          If the engine fails to load, build the browser target with <code>scripts/build_wasm.ps1</code>.
        </div>
      </section>
    </aside>
  </main>
  <script src="./app.js"></script>
</body>
</html>
